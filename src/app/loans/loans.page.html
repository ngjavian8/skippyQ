<ion-header>
  <ion-toolbar>
    <ion-title>My Loans</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item
      *ngFor="let loan of loans"
      button
      detail="true"
      (click)="goToDetail(loan.id)">

      <ion-icon
        slot="start"
        [name]="loan.status === 'approved' ? 'checkmark-circle' : loan.status === 'rejected' ? 'close-circle' : 'cloud-circle'"
        [color]="loan.status === 'approved' ? 'success' : loan.status === 'rejected' ? 'danger' : 'warning'">
      </ion-icon>

      <ion-label>
        <p>Username {{ loan.username }}</p>
        <p>Due Date {{ loan.duedate | date:'d MMM yyyy' }}</p>
        <p>Loan Items {{ loan.items?.length || 0 }}</p>
        <ion-badge color="warning" *ngIf="loan.isShared">Shared with you</ion-badge>
      </ion-label>

    </ion-item>
  </ion-list>
</ion-content>
