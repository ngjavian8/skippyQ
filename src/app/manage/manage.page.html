<ion-header>
  <ion-toolbar>
    <ion-title>Manage Loans</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngFor="let loan of loans">
    <ion-card-header>
      <ion-card-subtitle>{{ loan.username }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let item of loan.items">
          <ion-label>{{ item.id }} x {{ item.quantity }}</ion-label>

          <ion-badge slot="end"
            [color]="item.status === 'approved' ? 'success' : item.status === 'rejected' ? 'danger' : 'warning'">
            {{ item.status || 'pending' }}
          </ion-badge>

          <ng-container *ngIf="!item.status || item.status === 'pending'">
            <ion-button slot="end" fill="outline" color="success" size="small"
              (click)="approveItem(loan, item)">✓</ion-button>
            <ion-button slot="end" fill="outline" color="danger" size="small"
              (click)="rejectItem(loan, item)">✗</ion-button>
          </ng-container>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
